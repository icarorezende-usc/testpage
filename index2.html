      *, *::before, *::after { box-sizing: border-box; }
      body {

        max-width: 800px;
        margin: 40px auto;
        padding: 0 24px;

      }
      h1 { font-size: 1.4rem; margin-bottom: 4px; }
      .meta { font-size: 0.85rem; color: #666; margin-bottom: 24px; font-family: monospace; }
      .panel {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;

      }
      .panel h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin: 0 0 16px; }
      .check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #f0f0f0;

      }
      .check:last-child { border-bottom: none; }
      .check .icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
      .check.pass .icon::before { content: "✓"; color: #16a34a; }
      .check.fail .icon::before { content: "✗"; color: #dc2626; }
      .check.pending .icon::before { content: "⏳"; }
      .check .label { font-weight: 600; }
      .check .detail { color: #555; font-size: 0.88rem; font-family: monospace; margin-top: 2px; }
      .violation-item {

  <body>
  
    <h1>CSP Nonce Test — cb-consent-service</h1>
    <div class="meta">Branch: feat/EUD-5587-propagate-nonce-for-csp-compliance &nbsp;|&nbsp; CBID: 88c50b37-685e-4c5f-a166-ce1de4d70060</div>

    <div class="panel">
      <h2>Test Results</h2>
  
      <div class="check pending" id="check-nonce">
        <span class="icon"></span>
        <div>
          <div class="label">Nonce propagated</div>
          <div class="detail" id="check-nonce-detail">Waiting for CookiebotOnLoad…</div>
        </div>
      </div>
  
      <div class="check pending" id="check-violations">
        <span class="icon"></span>
        <div>
          <div class="label">No CSP violations</div>
          <div class="detail" id="check-violations-detail">Listening…</div>
          <div id="violation-list"></div>
        </div>
      </div>

      <div class="check pending" id="check-banner">
        <span class="icon"></span>
        <div>
          <div class="label">Banner rendered</div>
          <div class="detail" id="check-banner-detail">Waiting for CookiebotOnLoad…</div>
        </div>
      </div>
    </div>
  
    <div class="panel csp-panel">
      <div class="section-label">CSP in effect</div>
      <pre id="csp-display"></pre>
    </div>

     <script
    id="Cookiebot"
    src="https://dev-consent-cookiebot-com.cookiebot.dev/uc.js"
    data-cbid="88c50b37-685e-4c5f-a166-ce1de4d70060"
    nonce="cb-test-nonce-abc123"
    async
    ></script>
  
    <script nonce="cb-test-nonce-abc123">
      var violations = [];

      document.addEventListener('securitypolicyviolation', function (e) {
        violations.push({
          uri: e.blockedURI || '(empty)',
          directive: e.violatedDirective,
          source: e.sourceFile ? e.sourceFile + ':' + e.lineNumber : ''
        });
        renderViolationCheck();
      });

      function setCheck(id, pass, detail) {
        var el = document.getElementById(id);
        el.className = 'check ' + (pass ? 'pass' : 'fail');
        document.getElementById(id + '-detail').textContent = detail;
      }

      function renderViolationCheck() {
        var list = document.getElementById('violation-list');
        if (violations.length === 0) {
          setCheck('check-violations', true, 'None detected');
          list.innerHTML = '';
        } else {
          setCheck('check-violations', false, violations.length + ' violation(s) captured');
          list.innerHTML = violations.map(function (v) {
            return '<div class="violation-item">blocked: ' + v.uri +
              ' &nbsp;|&nbsp; directive: ' + v.directive +
              (v.source ? ' &nbsp;|&nbsp; source: ' + v.source : '') +
              '</div>';
          }).join('');
        }
      }
  
      function runChecks() {
        var nonce = window.CookieConsent && window.CookieConsent.nonce;
        if (nonce) {
          setCheck('check-nonce', true, 'window.CookieConsent.nonce = "' + nonce + '"');
        } else {
          setCheck('check-nonce', false,
            'window.CookieConsent.nonce is empty — uc.js did not read the nonce from the script tag');
        }

        renderViolationCheck();
  
        var banner = document.getElementById('CybotCookiebotDialog');
        if (banner) {
          setCheck('check-banner', true, '#CybotCookiebotDialog found in DOM');
        } else {
          setCheck('check-banner', false,
            '#CybotCookiebotDialog not found — banner may be blocked or consent already given');
        }
      }
  
      var metaCSP = document.querySelector('meta[http-equiv="Content-Security-Policy"]');
      if (metaCSP) {
        document.getElementById('csp-display').textContent =
          metaCSP.getAttribute('content').replace(/;\s*/g, ';\n');
      }
  
      var checked = false;
      function onceChecks() {
        if (checked) return;
        checked = true;
        runChecks();
      }
  
      window.CookiebotOnLoad = onceChecks;
      setTimeout(onceChecks, 5000);
    </script>
  
  </body>
  </html>
